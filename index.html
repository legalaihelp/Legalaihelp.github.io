<!DOCTYPE html>
<html>
<head>
  <title>Legal AI Helper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Legal AI Helper ⚖️</h1>
  <p>Generate legal documents instantly</p>

  <textarea id="input" placeholder="Type your question..."></textarea>
  <br><br>

  <button onclick="generate()">Generate</button>

  <h3 id="output"></h3>

  <script>
    function generate() {
      let input = document.getElementById("input").value.toLowerCase();
      let output = "";

      if (input.includes("file case")) {
        output = "Steps to file a case:\n1. Hire lawyer\n2. Prepare documents\n3. File in court\n4. Attend hearings";
      } 
      else if (input.includes("affidavit")) {
        output = "Affidavit:\nA written statement sworn under oath.\n\nSteps:\n1. Write\n2. Print\n3. Notary sign";
      } 
      else if (input.includes("legal notice")) {
        output = "Legal Notice:\n1. Draft notice\n2. Send via advocate\n3. Wait for response";
      } 
      else {
        output = "Try: affidavit / legal notice / file case";
      }

      document.getElementById("output").innerText = output;
    }
  </script>

</body>
</html>
